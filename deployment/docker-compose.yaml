services:
  ingestion_service:
    container_name: ingestion_service
    build:
      context: ../
      dockerfile: Dockerfile
      target: production
    environment:
      - ENV=production
      - PORT=8001
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-password}@analysis_db:5432/${DB_NAME:-analysis_db}
      - ANALYSIS_SERVICE_URL=http://analytics_service:8000/v1/analysis
    networks:
      - analysis_network
    depends_on:
      - postgres
      - redis
      - analytics_service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
